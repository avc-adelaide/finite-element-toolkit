name: Compile and Publish Theory Document

on:
  push:
    branches:
      - main
    paths:
      - 'theory/**'
      - '.github/workflows/publish-theory.yml'
  workflow_dispatch:

# Grant the minimum permissions required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; cancel in-progress runs if a new one starts
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Compile LaTeX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile fenics_theory.tex to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: fenics_theory.tex
          working_directory: theory

      - name: Build GitHub Pages site
        run: |
          mkdir -p _site
          cp theory/fenics_theory.pdf _site/
          cat > _site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>AU FE Template – Theory Document</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                max-width: 700px;
                margin: 4rem auto;
                padding: 0 1.5rem;
                color: #24292f;
              }
              h1 { font-size: 1.8rem; margin-bottom: 0.4rem; }
              p  { color: #57606a; margin-top: 0.25rem; }
              .btn {
                display: inline-block;
                margin-top: 1.5rem;
                padding: 0.6rem 1.4rem;
                background: #0969da;
                color: #fff;
                border-radius: 6px;
                text-decoration: none;
                font-weight: 600;
                font-size: 1rem;
              }
              .btn:hover { background: #0550ae; }
            </style>
          </head>
          <body>
            <h1>FEniCSx Theory Document</h1>
            <p>A didactic introduction to the Finite Element Method and its implementation in FEniCSx.</p>
            <a class="btn" href="fenics_theory.pdf">Open PDF ↗</a>
          </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
